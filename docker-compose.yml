services:
  postgres:
    image: postgres:16-alpine
    container_name: equipment-agent-postgres
    environment:
      POSTGRES_DB: equipment_agent
      POSTGRES_USER: equipment_agent
      POSTGRES_PASSWORD: equipment_agent
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equipment_agent -d equipment_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: equipment-agent-backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: local
      APP_PORT: 8000
      FRONTEND_ORIGIN: http://localhost:3100
      SECRET_KEY: local-development-secret-change-before-deploy
      DATABASE_URL: postgresql+psycopg://equipment_agent:equipment_agent@postgres:5432/equipment_agent
      AUTO_CREATE_TABLES: "true"
      LOG_LEVEL: INFO
      LOG_FORMAT: console
      DOCKER_LOGS_ENABLED: "true"
      METRICS_ENABLED: "true"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-qwen/qwen3-32b}
      CHROMA_PERSIST_DIR: ./data/chroma
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hashing}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HASHING_EMBEDDING_DIMENSIONS: 256
      TOP_K_TEXT: 5
      TOP_K_IMAGES: 3
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-hybrid}
      RETRIEVAL_CANDIDATE_MULTIPLIER: ${RETRIEVAL_CANDIDATE_MULTIPLIER:-4}
      LEXICAL_CANDIDATE_LIMIT: ${LEXICAL_CANDIDATE_LIMIT:-1000}
      RECIPROCAL_RANK_FUSION_K: ${RECIPROCAL_RANK_FUSION_K:-60}
      MAX_REVISION_LOOPS: 1
      UPLOAD_DIR: ./data/uploads
      IMAGE_DIR: ./data/images
      TRACE_DIR: ./data/traces
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES:-1000}
      MAX_UPLOAD_FILENAME_LENGTH: 255
      INGESTION_MODE: background
      INGESTION_MAX_ATTEMPTS: 3
      INGESTION_POLL_SECONDS: 2
      INGESTION_JOB_TIMEOUT_MINUTES: 30
    ports:
      - "8100:8000"
    volumes:
      - ./backend/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.ingestion"]
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: local
      SECRET_KEY: local-development-secret-change-before-deploy
      DATABASE_URL: postgresql+psycopg://equipment_agent:equipment_agent@postgres:5432/equipment_agent
      AUTO_CREATE_TABLES: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: console
      DOCKER_LOGS_ENABLED: "false"
      METRICS_ENABLED: "false"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-qwen/qwen3-32b}
      CHROMA_PERSIST_DIR: ./data/chroma
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hashing}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HASHING_EMBEDDING_DIMENSIONS: 256
      UPLOAD_DIR: ./data/uploads
      IMAGE_DIR: ./data/images
      TRACE_DIR: ./data/traces
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES:-1000}
      INGESTION_MODE: background
      INGESTION_MAX_ATTEMPTS: 3
      INGESTION_POLL_SECONDS: 2
      INGESTION_JOB_TIMEOUT_MINUTES: 30
    volumes:
      - ./backend/data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: equipment-agent-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8100
    ports:
      - "3100:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres_data:
